<svg width="128" height="110" viewBox="0 0 128 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      
      .pcb-board { fill: #0f172a; } 
      .silk-logo { 
        fill: #ffffff; 
        font-family: 'Space Grotesk', sans-serif; 
        font-weight: 700; 
        text-anchor: middle;
      }
      .silk-border { fill: none; stroke: #ffffff; stroke-width: 1.5; }
      .pin { fill: #ffffff; }
    </style>
  </defs>

  <!-- Permanent Navy Background -->
  <rect width="128" height="110" rx="8" ry="8" class="pcb-board"/>
  
  <!-- Stylized Chip Body -->
  <rect x="29" y="20" width="70" height="70" rx="4" ry="4" class="silk-border"/>

  <!-- Pins (Left side) -->
  <rect x="21" y="31" width="8" height="8" class="pin"/>
  <rect x="21" y="45" width="8" height="8" class="pin"/>
  <rect x="21" y="59" width="8" height="8" class="pin"/>
  <rect x="21" y="73" width="8" height="8" class="pin"/>

  <!-- Pins (Right side) -->
  <rect x="99" width="8" height="8" y="31" class="pin"/>
  <rect x="99" width="8" height="8" y="45" class="pin"/>
  <rect x="99" width="8" height="8" y="59" class="pin"/>
  <rect x="99" width="8" height="8" y="73" class="pin"/>

  <!-- "PR" Text -->
  <text x="64" y="68" font-size="35" class="silk-logo">PR</text>
  
  <!-- Pin 1 indicator -->
  <circle cx="37" cy="28" r="2.5" fill="#ffffff"/>
</svg>
