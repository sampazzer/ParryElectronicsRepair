<svg width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .silk-logo { fill: #ffffff; font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-anchor: middle; }
      .silk-border { fill: none; stroke: #ffffff; stroke-width: 2.5; }
      .pin { fill: #ffffff; }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="110" height="110" rx="8" ry="8" fill="url(#bgGradient)"/>
  
  <!-- Stylized Chip Body: Centered at (55, 55) -->
  <rect x="20" y="20" width="70" height="70" rx="4" ry="4" class="silk-border"/>

  <!-- Left/Right Pins (Mathematically distributed) -->
  <rect x="15" y="27.6" width="5" height="8" class="pin"/>
  <rect x="15" y="43.2" width="5" height="8" class="pin"/>
  <rect x="15" y="58.8" width="5" height="8" class="pin"/>
  <rect x="15" y="74.4" width="5" height="8" class="pin"/>

  <rect x="90" y="27.6" width="5" height="8" class="pin"/>
  <rect x="90" y="43.2" width="5" height="8" class="pin"/>
  <rect x="90" y="58.8" width="5" height="8" class="pin"/>
  <rect x="90" y="74.4" width="5" height="8" class="pin"/>

  <!-- Top/Bottom Pins (Mathematically distributed) -->
  <rect x="27.6" y="15" width="8" height="5" class="pin"/>
  <rect x="43.2" y="15" width="8" height="5" class="pin"/>
  <rect x="58.8" y="15" width="8" height="5" class="pin"/>
  <rect x="74.4" y="15" width="8" height="5" class="pin"/>

  <rect x="27.6" y="90" width="8" height="5" class="pin"/>
  <rect x="43.2" y="90" width="8" height="5" class="pin"/>
  <rect x="58.8" y="90" width="8" height="5" class="pin"/>
  <rect x="74.4" y="90" width="8" height="5" class="pin"/>

  <!-- "PR" Text -->
  <text x="55" y="68" font-size="35" class="silk-logo">PR</text>
  
  <!-- Pin 1 indicator -->
  <circle cx="31" cy="31" r="4" fill="#ffffff"/>
</svg>
